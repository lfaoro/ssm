# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2
dist: build
report_sizes: true

before:
  hooks:
    - go mod tidy
    - go fmt ./...
    # - go vet ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - freebsd
      - openbsd
    goarch:
      - amd64
      - arm64
    tags:
      - netgo
      - osusergo
      - static_build
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X main.BuildVersion={{.Version}}
      - -X main.BuildDate={{.Date}}
      - -X main.BuildSHA={{.Commit}}
      - -extldflags '-static'

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version}}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

universal_binaries:
  -
    replace: true
    name_template: "ssm"

nfpms:
  -
    vendor: "Leonardo Faoro"
    homepage: "https://github.com/lfaoro/ssm"
    maintainer: "Leonardo Faoro <ssm@leonardofaoro.com>"
    file_name_template: "ssm_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - deb
      - rpm
    license: MIT
    dependencies:
      - ssh
    suggests:
      - sshpass
      - mosh

brews:
  - name: ssm
    homepage: "https://github.com/lfaoro/ssm"
    description: "SSM | Secure Shell Manager"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    repository:
      owner: lfaoro
      name: tap
    commit_author:
      name: bot
      email: bot@leonardofaoro.com
    skip_upload: false

# GPG signing requires GPG_PRIVATE_KEY secret configured in the repo.
aurs:
  - name: ssm-bin
    homepage: "https://github.com/lfaoro/ssm"
    description: "SSH connection manager with a TUI"
    maintainers:
      - "Leonardo Faoro <ssm@leonardofaoro.com>"
    license: "MIT"
    provides:
      - ssm
    conflicts:
      - ssm
    depends:
      - openssh
    commit_author:
      name: bot
      email: bot@leonardofaoro.com
    git_ssh_command: 'ssh -o StrictHostKeyChecking=accept-new'
    skip_upload: true

signs:
  - cmd: gpg
    signature: "${artifact}.asc"
    output: true
    artifacts: all
    args:
      - --detach-sign
      - --armor
      - --batch
      - "${artifact}"  

release:
  disable: false
  mode: replace
  draft: false
  prerelease: auto
