name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"

permissions: read-all

jobs:
  analysis:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: github/codeql-action/init@018511a1aac61b6e92783189d8c0081eb8f69932  # v3.28.13
        with:
          languages: go
          queries: security-extended,security-and-quality

      - uses: github/codeql-action/autobuild@018511a1aac61b6e92783189d8c0081eb8f69932  # v3.28.13

      - uses: github/codeql-action/analyze@018511a1aac61b6e92783189d8c0081eb8f69932  # v3.28.13
