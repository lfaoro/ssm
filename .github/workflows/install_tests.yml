name: Install tests
on:
  push:
    branches: [main]

permissions: read-all

jobs:
  install_on_linux_x86:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    - run: ./scripts/get.sh
      shell: bash

  install_on_linux_arm:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    - run: ./scripts/get.sh
      shell: bash

  install_script_custom_dir:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    - run: ./scripts/get.sh --dir /tmp/ssm-custom
      shell: bash
    - run: /tmp/ssm-custom/ssm --version
      shell: bash

  install_script_unsupported_os:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    - run: |
        fake_uname=$(mktemp)
        printf '#!/bin/sh\necho Windows_NT\n' > "$fake_uname"
        chmod +x "$fake_uname"
        output=$(PATH="$(dirname "$fake_uname"):$PATH" bash scripts/get.sh 2>&1) || true
        echo "$output" | grep "unsupported operating system"
      shell: bash
