name: Install tests
on:
  push:
    branches: [main]

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-deprecation"

jobs:
  install_on_linux_x86:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - run: ./scripts/get.sh
      shell: bash

  install_on_linux_arm:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - run: ./scripts/get.sh
      shell: bash

  install_script_custom_dir:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - run: ./scripts/get.sh --dir /tmp/ssm-custom
      shell: bash
    - run: /tmp/ssm-custom/ssm --version
      shell: bash

  install_script_unsupported_os:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - run: |
        fake_dir=$(mktemp -d)
        printf '#!/bin/sh\necho Windows_NT\n' > "$fake_dir/uname"
        chmod +x "$fake_dir/uname"
        set +e
        output=$(PATH="$fake_dir:$PATH" bash scripts/get.sh 2>&1)
        rc=$?
        set -e
        if ! echo "$output" | grep -q "unsupported operating system"; then
          echo "expected error message not found, got:"
          echo "$output"
          exit 1
        fi
        if [ $rc -eq 0 ]; then
          echo "expected non-zero exit code, got $rc"
          exit 1
        fi
      shell: bash
