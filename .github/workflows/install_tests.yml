name: Install tests
on:
  push:
    branches: [main]

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-deprecation"

jobs:
  install_on_linux_x86:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    - run: ./scripts/get.sh
      shell: bash

  install_on_linux_arm:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    - run: ./scripts/get.sh
      shell: bash

  install_script_custom_dir:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    - run: ./scripts/get.sh --dir /tmp/ssm-custom
      shell: bash
    - run: /tmp/ssm-custom/ssm --version
      shell: bash

  install_script_unsupported_os:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    - run: |
        fake_dir=$(mktemp -d)
        printf '#!/bin/sh\necho Windows_NT\n' > "$fake_dir/uname"
        chmod +x "$fake_dir/uname"
        set +e
        output=$(PATH="$fake_dir:$PATH" bash scripts/get.sh 2>&1)
        rc=$?
        set -e
        if ! echo "$output" | grep -q "unsupported operating system"; then
          echo "expected error message not found, got:"
          echo "$output"
          exit 1
        fi
        if [ $rc -eq 0 ]; then
          echo "expected non-zero exit code, got $rc"
          exit 1
        fi
      shell: bash

  install_script_path_modification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Test --no-modify-path does not touch rc files
        run: |
          export HOME=$(mktemp -d)
          export SHELL=/bin/bash
          ./scripts/get.sh --no-modify-path --dir /tmp/ssm-nomod
          if [ -f "$HOME/.bashrc" ] && grep -q "ssm-nomod" "$HOME/.bashrc"; then
            echo "ERROR: --no-modify-path should not have modified .bashrc"
            exit 1
          fi
          /tmp/ssm-nomod/ssm --version

      - name: Test --modify-path appends to bashrc with comment
        run: |
          export HOME=$(mktemp -d)
          export SHELL=/bin/bash
          ./scripts/get.sh --modify-path --dir /tmp/ssm-mod
          if ! grep -q "Added by ssm install script" "$HOME/.bashrc"; then
            echo "ERROR: Expected comment not found in .bashrc"
            cat "$HOME/.bashrc"
            exit 1
          fi
          if ! grep -q "/tmp/ssm-mod" "$HOME/.bashrc"; then
            echo "ERROR: PATH line not found"
            exit 1
          fi
          /tmp/ssm-mod/ssm --version

      - name: Test unsupported shell shows generic message
        shell: bash
        run: |
          export HOME=$(mktemp -d)
          export SHELL=/bin/dash
          output=$(./scripts/get.sh --dir /tmp/ssm-dash 2>&1 || true)
          if ! echo "$output" | grep -q "Add /tmp/ssm-dash to your PATH"; then
            echo "ERROR: Did not get expected message for unsupported shell"
            echo "$output"
            exit 1
          fi
