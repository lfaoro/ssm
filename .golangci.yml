version: "2"
run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - revive
    - ineffassign
    - unused
    - gosec
    - modernize
    - gocyclo
    - misspell
    - unconvert
    - bodyclose
    - noctx
    - nilnil
    - prealloc
    - dupword
    - intrange
    - perfsprint
  settings:
    gocyclo:
      min-complexity: 55
